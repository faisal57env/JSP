<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation 3 </title>
    <style>
        #img1{
            height: 300px;
            width: 300px;
            background-color: red;
            animation-name: movingElement;
            animation-duration: 2s;
            animation-iteration-count: infinite;
            /* animation delay 2s;*/
            
            animation-direction: alternate;
        }
        @keyframes movingElement {
            from{
               transform: scale(0);
            }
            to{
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    
    <img src="https://www.google.com/imgres?q=cat%20memes&imgurl=https%3A%2F%2Fstatic.boredpanda.com%2Fblog%2Fwp-content%2Fuploads%2F2025%2F10%2Ffunny-cat-memes-go-hard-cover_675.jpg&imgrefurl=https%3A%2F%2Fwww.boredpanda.com%2Ffunny-cat-memes-go-hard%2F&docid=nOeErPcnC-nlhM&tbnid=UXu-uWn1WVzeaM&vet=12ahUKEwjVq6uLtPmUAxUKzzgGHWeOGD0QnPAOegQIFhAB..i&w=1200&h=675&hcb=2&ved=2ahUKEwjVq6uLtPmUAxUKzzgGHWeOGD0QnPAOegQIFhAB" alt="">
</body>
</html>
