<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation 5 - Background Change</title>
    <style>
        #imageChanger {
            margin: 40px auto;
            height: 500px;
            width: 500px;
            background-size: cover;
            background-position: center;
            border: 5px solid purple;
            animation-name: changeBackground;
            animation-duration: 4s;
            animation-iteration-count: infinite;
            animation-direction: alternate;
        }

        @keyframes changeBackground {
            from {
                background-image: url('https://i.pinimg.com/736x/5d/a3/60/5da360c98b9af0ad709fe18606992229.jpg');
            }
            to {
                background-image: url('https://media.tenor.com/NzBjcLn9t9kAAAAM/cat-cats.gif');
            }
        }
    </style>
</head>
<body>
    <h2>Background Image Animation</h2>
    <div id="imageChanger"></div>
</body>
</html>
