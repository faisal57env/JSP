<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-image: url();
        }
        p{
            font-weight: bold;
            font-size: 30px;
            color: yellow;                               /* Predefined value*/
            color: rgb(250, 239, 239);                  /* rgb (0-255,0-255,0-255)*/
            background-color: rgba(0, 0, 255, 0.5);      /* rgb (0-255,0-255 0-255) */
            color: hsl(0, 100%, 58%);                    /* hsl(hue 0-360), saturation(0-100%), lightness(0-100); */
            
            color: hsla(0, 100%, 48%, 0.6);             /* HSLA()*/
            color: #11520d;                             /* Hexadecimal way*/
        }
    </style>
</head>
