<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opacity</title>
    <style>
        #div1{
            height: 350px;
            width: 350px;
           background-color: red;
           color: wheat;
            position: absolute;
            top: 0px;
            left: 0px;
            opacity: 0.3;


        }
    </style>
</head>
<body>
    <h1>Opacity Property</h1>
        <p>it is used to give transparency to the elements</p>
        <p> it's value must be in between </p>
        <p>if we give 0, the element will be fully transparent </p>
        <p>if we give 1, the will be no tranparency</p>
        <p></p>
    <div id="div1">
        

    </div>
</body>
</html>
