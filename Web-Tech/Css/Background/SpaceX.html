<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpaceX</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

#navbar{
   /* border:3px solid red;*/

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:20px;
    gap:20px;
}

#logo{
    background:aqua;
    /*border:2px solid green;*/
    padding:10px;

    flex-shrink:0;
}

#links{
    background:lightyellow;
    /*border:2px solid blue;*/
    
    display:flex;
    gap:20px;

    flex-grow:1;

    justify-content:center;
    align-items:center;
}

#links div{
    padding:10px;
    /*border:1px solid black;*/
}

#launch{
    background:pink;
    /*border:2px solid purple;*/
    padding:10px;

    flex-shrink:0;

    display:flex;
    flex-direction:column;
    align-items:flex-end;
}

</style>
</head>
<body>

<h2>SpaceX</h2>

<div id="navbar">

    <div id="logo">
        SPACEX
    </div>

    <div id="links">
        <div>Vehicles</div>
        <div>Human Spaceflight</div>
        <div>Starlink</div>
        <div>Starshield</div>
        <div>xAI</div>
        <div>Terafab</div>
        <div>Company</div>
        <div>Shop</div>
    </div>

    <div id="launch">
        <div>Current Launch</div>
        <div>T+ 01:23:45</div>
    </div>

</div>

</body>
</html>
