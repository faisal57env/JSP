<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Index</title>
    <style>
        #div1{
            height: 100px;
            width: 300px;
            color: rgb(229, 9, 9);
            font-size: 30px;
            font-weight: bold;
            border-color: red;
        }
        #div2{
            background-color: green;
            position: absolute;
            top: 20px;
            left: 60px;
            border-color: rgb(198, 237, 6);
        }
        #div3{
            background-color: blueviolet;
            position: absolute;
            top: 40px;
            left: 150px;
        }

    </style>
</head>
<body>
    <div id="div1">div1</div>
    <div id="div2">div2</div>
    <div id="div3">div3</div>
</body>
</html>
