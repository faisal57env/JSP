<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox - flex-shrink</title>
    <style>
        #parent {
            border: 3px solid red;
            background: #f0f0f0;
            display: flex;
            justify-content: space-around;
            height: 150px;
            margin: 20px;
            overflow: hidden; /* Helps visualize shrinking */
        }

        #parent > div {
            background-color: aqua;
            border: 3px solid green;
            width: 200px;
            padding: 10px;
            text-align: center;
            font-weight: bold;
        }

        #child1 { flex-shrink: 0; } /* Never shrinks */
        #child2 { flex-shrink: 1; }
        #child3 { flex-shrink: 2; } /* Shrinks twice as much as child2 */
    </style>
</head>
<body>
    <h2>Flexbox: <code>flex-shrink</code></h2>
    <p>Resize the browser window to see shrinking behavior.</p>
    
    <div id="parent">
        <div id="child1">Child 1 (shrink: 0)</div>
        <div id="child2">Child 2 (shrink: 1)</div>
        <div id="child3">Child 3 (shrink: 2)</div>
    </div>
</body>
</html>
