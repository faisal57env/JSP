<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox - flex-grow</title>
    <style>
        #parent {
            border: 3px solid red;
            background: #f0f0f0;
            display: flex;
            justify-content: space-around;
            height: 150px;
            margin: 20px;
        }

        #parent > div {
            background-color: aqua;
            border: 3px solid green;
            padding: 10px;
            text-align: center;
            font-weight: bold;
        }

        #child1 { flex-grow: 1; }
        #child2 { flex-grow: 2; }
        #child3 { flex-grow: 3; }
    </style>
</head>
<body>
    <h2>Flexbox: <code>flex-grow</code></h2>
    <p>The numbers indicate how much each item grows relative to others.</p>
    
    <div id="parent">
        <div id="child1">Child 1 (grow: 1)</div>
        <div id="child2">Child 2 (grow: 2)</div>
        <div id="child3">Child 3 (grow: 3)</div>
    </div>
</body>
</html>
