<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox - align-self</title>
    <style>
        #parent {
            border: 3px solid red;
            background: #f0f0f0;
            display: flex;
            justify-content: space-around;
            align-items: center; /* Cross axis alignment */
            height: 200px;
            margin: 20px;
        }

        #parent > div {
            background-color: aqua;
            border: 3px solid green;
            padding: 15px;
            text-align: center;
            font-weight: bold;
        }

        #child3 { align-self: flex-start; }
        #child1 { align-self: flex-end; }
        #child5 { align-self: flex-end; }
    </style>
</head>
<body>
    <h2>Flexbox: <code>align-self</code></h2>
    <p>Individual alignment on the cross axis (overrides <code>align-items</code>).</p>
    
    <div id="parent">
        <div id="child1">Child 1 (flex-end)</div>
        <div id="child2">Child 2</div>
        <div id="child3">Child 3 (flex-start)</div>
        <div id="child4">Child 4</div>
        <div id="child5">Child 5 (flex-end)</div>
    </div>
</body>
</html>
