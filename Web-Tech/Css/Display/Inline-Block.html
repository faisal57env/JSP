<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline-Block Display</title>
    <style>
        div,li{
            border: 2px solid red;
            display: inline-block;
            height: 100px;
            width: 100px;
        }
    </style>
</head>
<body>
    <h1>
        display:inline-block; property
    </h1>
    <p>It is same as display : inline but we can set height and width for the block </p>
    <p>It acts like Inline level element and the block level elements  </p>
    <div>Hello</div>
    <div>World</div>
    <ul>
        <li>List Item1</li>
        <li>List Item2</li>
        <li>List Item3</li>
        <li>List Item4</li>
    </ul>
</body>
</html>
