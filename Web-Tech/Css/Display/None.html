<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>None Display</title>
    <style>
        div,li{
            border: 2px solid red;
            display: inline;
        }
        h1{
            display: none;
        }
        h2{
            visibility: hidden;
        }
    </style>
</head>
<body>
    <h1> display:None; property</h1>
    <h2> this is an h2 tag</h2>

    <p>It will hide elements into webpage or in other words we can say this will not display the the content on the webpage </p> 
    <p> Space is not created in webpage </p>
    <div>Hello</div>
    <div>World</div>
</body>
</html>
