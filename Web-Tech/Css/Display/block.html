<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Display</title>
    <style>
        div,li{
            border: 2px solid red;
            display: inline;
        }
        span{
             border: 2px solid red;
            display: block;
        }
    </style>
</head>
<body>
    <h1>
        display:block; property
    </h1>
    <p>It convert the Inline level elements into block level element </p>
    <div>Hello</div>
    <div>World</div>
    <ul>
        <li>List Item1</li>
        <li>List Item2</li>
        <li>List Item3</li>
        <li>List Item4</li>
    </ul>
    <span> This is a Span tag....</span>

</body>
</html>
