<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline Display</title>
    <style>
        div,li{
            border: 2px solid red;
            display: inline;
        }
    </style>
</head>
<body>
    <h1>
        display:inline; property
    </h1>
    <p>It convert the block level elements into Inline level element </p>
    <div>Hello</div>
    <div>World</div>
</body>
</html>
